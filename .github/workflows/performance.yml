name: Performance Monitoring

on:
  push:
    branches: [ main ]
  schedule:
    # Run performance tests every 6 hours
    - cron: '0 */6 * * *'

jobs:
  performance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/sk_live_eIVIYwPZJe7npIHAcEGRwqAWInRtuc8kMpjkAreN/${{ secrets.ADJUTOR_API_KEY }}/g' .env
      
      - name: Run tests with performance monitoring
        run: npm test -- --runInBand --verbose
        timeout-minutes: 10
      
      - name: Analyze performance metrics
        if: always()
        run: |
          echo "📊 Performance Analysis"
          if [ -f "logs/performance.json" ]; then
            cat logs/performance.json
          fi
      
      - name: Store performance baseline
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-baseline
          path: logs/
          retention-days: 90
